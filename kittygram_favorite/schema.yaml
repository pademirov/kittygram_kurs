components:
  schemas:
    Achievement:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        achievement_name:
          type: string
      required:
      - achievement_name
      - id
    Activation:
      type: object
      properties:
        uid:
          type: string
        token:
          type: string
      required:
      - token
      - uid
    Cat:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 16
        color:
          type: string
        birth_year:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        achievements:
          type: array
          items:
            $ref: '#/components/schemas/Achievement'
        owner:
          type: integer
          readOnly: true
        age:
          type: string
          readOnly: true
        image:
          type: string
          format: uri
          nullable: true
        likes_count:
          type: integer
          readOnly: true
        liked_by:
          type: array
          items:
            $ref: '#/components/schemas/LikeUser'
          readOnly: true
        is_favorite:
          type: string
          readOnly: true
      required:
      - age
      - birth_year
