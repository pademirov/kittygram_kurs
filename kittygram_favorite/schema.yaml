  /api/cats/:
    get:
      operationId: cats_list
      parameters:
      - in: query
        name: color
        schema:
          type: array
          items:
            type: string
            enum:
            - bisque
            - black
            - gray
            - orange
            - red
            - saddlebrown
            - white
        description: |-
          * `red` - Красный
          * `black` - Чёрный
          * `white` - Белый
          * `gray` - Серый
          * `orange` - Оранжевый
          * `bisque` - Бежевый
          * `saddlebrown` - Коричневый
        explode: true
        style: form
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
